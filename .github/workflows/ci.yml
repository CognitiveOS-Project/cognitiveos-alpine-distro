name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts
          severity: warning


  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up SSH Keys
        run: |
          eval $(ssh-agent -s)
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_CPM }}" > ~/.ssh/id_cpm && chmod 600 ~/.ssh/id_cpm
          echo "${{ secrets.SSH_KEY_COGNITIVEOSD }}" > ~/.ssh/id_cogd && chmod 600 ~/.ssh/id_cogd
          echo "${{ secrets.SSH_KEY_CLI }}" > ~/.ssh/id_cli && chmod 600 ~/.ssh/id_cli
          echo "${{ secrets.SSH_KEY_INFERENCE }}" > ~/.ssh/id_inf && chmod 600 ~/.ssh/id_inf
          echo "${{ secrets.SSH_KEY_CORE_MCP_BRIDGES }}" > ~/.ssh/id_bridges && chmod 600 ~/.ssh/id_bridges
          echo "${{ secrets.SSH_KEY_COGNITIVEOS_DISTRO }}" > ~/.ssh/id_dist && chmod 600 ~/.ssh/id_dist
          ssh-add ~/.ssh/id_cpm ~/.ssh/id_cogd ~/.ssh/id_cli ~/.ssh/id_inf ~/.ssh/id_bridges ~/.ssh/id_dist
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Verify each repo builds via its own Makefile
        run: make verify-repos

  script-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts syntax
        run: |
          for script in scripts/*.sh; do
            echo "Checking $script..."
            sh -n "$script"
          done
          echo "All scripts pass syntax check"

  image-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build dev Docker image
        run: make docker.dev


